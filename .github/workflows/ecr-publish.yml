name: Build and Push Docker Images to ECR

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build API image
      run: docker build -t hybrid-ocr-api ./hybrid-ocr-api

    - name: Tag API image
      run: docker tag hybrid-ocr-api:latest 037931721217.dkr.ecr.ap-southeast-1.amazonaws.com/hybrid-ocr-dev-api:latest

    - name: Push API image
      run: docker push 037931721217.dkr.ecr.ap-southeast-1.amazonaws.com/hybrid-ocr-dev-api:latest

    - name: Build Worker image
      run: docker build -t hybrid-ocr-worker ./hybrid-ocr-worker

    - name: Tag Worker image
      run: docker tag hybrid-ocr-worker:latest 037931721217.dkr.ecr.ap-southeast-1.amazonaws.com/hybrid-ocr-dev-worker:latest

    - name: Push Worker image
      run: docker push 037931721217.dkr.ecr.ap-southeast-1.amazonaws.com/hybrid-ocr-dev-worker:latest
