name: Docker CI

on:
  push:
    branches: [main]
    paths:
      - 'hybrid-ocr-api/**'
      - 'hybrid-ocr-worker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hybrid-ocr-api/**'
      - 'hybrid-ocr-worker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-ci.yml'

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t hybrid-ocr-api ./hybrid-ocr-api

      - name: Build Worker image
        run: docker build -t hybrid-ocr-worker ./hybrid-ocr-worker
